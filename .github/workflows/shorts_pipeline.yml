name: Shorts Pipeline

on:
  schedule:
    - cron: "0 1 * * *"    # 01:00 UTC = 04:00 بتوقيت بغداد
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'تفعيل وضع الاختبار (نشر خاص)'
        required: true
        default: true
        type: boolean

jobs:
  produce_and_publish_short:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: تثبيت متطلبات بايثون
        run: pip install -r requirements.txt

      - name: تثبيت ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: تثبيت متطلبات Remotion
        working-directory: remotion
        run: npm install --legacy-peer-deps

      - name: تشغيل خط إنتاج الشورت
        env:
          GEMINI_KEY_LIGHT: ${{ secrets.GEMINI_KEY_LIGHT }}
          GEMINI_KEY_ADVANCED: ${{ secrets.GEMINI_KEY_ADVANCED }}
          GEMINI_KEY_IMAGE: ${{ secrets.GEMINI_KEY_IMAGE }}
          YOUTUBE_SEARCH_API_KEY: ${{ secrets.YOUTUBE_SEARCH_API_KEY }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'true' }}
        run: python -m scripts.shorts_pipeline
